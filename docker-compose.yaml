services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '3000:3000'
    environment:
      # Core
      - NODE_ENV=production
      - NAME=PolarBase
      - VERSION=v0.9.1-beta
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - VERBOSE=false
      - DEBUG=false

      # Security
      - CORS_ORIGINS=*
      - SUPER_ADMIN_API_KEY=ak_demo_polarbase_2026

      # REST API
      - REST_ENABLED=true
      - REST_PREFIX=/rest
      - REST_RATE_LIMIT=100

      # AGENT API
      - AGENT_ENABLED=true
      - AGENT_PREFIX=/agent
      - AGENT_RATE_LIMIT=10

      # MCP Server
      - MCP_ENABLED=true
      - MCP_PATH=/mcp
      - MCP_DATABASE_PORT=8081
      - MCP_DATABASE_PATH=/database
      - MCP_BROWSER_PORT=8082
      - MCP_BROWSER_PATH=/browser

      # Realtime Engine
      - REALTIME_ENABLED=true
      - REALTIME_PATH=/realtime
      - REALTIME_MAX_CLIENTS=1000

      # PostgreSQL
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=P@ssw0rd2026
      - POSTGRES_DB=polarbase
      - POSTGRES_SSL=false
      - POSTGRES_MAX_CONNECTIONS=20

      # AI Agents (LLM)
      - LLM_DEFAULT_PROVIDER=google
      - LLM_DEFAULT_MODEL=gemini-3-pro-preview
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-http://localhost:1234/v1}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-not-needed}

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '80:80'
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: polarbase-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=P@ssw0rd2026
      - POSTGRES_DB=polarbase
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sample.sql:/docker-entrypoint-initdb.d/sample.sql # To skip: comment or remove this line
    ports:
      - '5432:5432'
    restart: unless-stopped
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_replication_slots=20'
      - '-c'
      - 'max_wal_senders=20'
      - '-c'
      - 'max_logical_replication_workers=20'
      - '-c'
      - 'max_worker_processes=20'
      - '-c'
      - 'max_slot_wal_keep_size=1GB'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d polarbase']
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
      start_interval: 2s

volumes:
  postgres_data:
