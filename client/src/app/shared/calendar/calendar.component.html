<div class="flex flex-col gap-4 w-full h-full">
  <div class="flex flex-wrap justify-between gap-2" [class]="toolbarStyleClass()">
    <div class="flex">
      <div class="flex items-start">
        <ng-container *ngTemplateOutlet="toolbarTmpl()"></ng-container>
        <ng-container *ngTemplateOutlet="leftToolbarTmpl()"></ng-container>
      </div>
    </div>
    <div class="flex flex-wrap gap-y-2 h-fit">
      <ng-container *ngTemplateOutlet="rightToolbarTmpl()"></ng-container>
      <p-divider layout="vertical" class="scale-80" />
      <div class="flex items-center">
        <p>
          @switch (view) {
            @case (CV.MONTH) {
              {{ getCurrentDate() | date: 'MMM, y' }}
            }
            @case (CV.WEEK) {
              {{ getCurrentDate() | date: 'E, MMM d, y' }}
            }
            @case (CV.DAY) {
              {{ getCurrentDate() | date: 'MMM d, y' }}
            }
          }
        </p>
      </div>
      <p-divider layout="vertical" class="scale-80" />
      <div class="flex items-center">
        <p-selectbutton
          [options]="viewOptions"
          [allowEmpty]="false"
          [(ngModel)]="view"
          (ngModelChange)="changeView($event)"
        />
      </div>
      <p-divider layout="vertical" class="scale-80" />
      <div class="flex gap-2">
        <p-button label="Today" severity="secondary" (click)="today()" />
        <p-button icon="icon icon-chevron-left" severity="secondary" (click)="prev()" />
        <p-button icon="icon icon-chevron-right" severity="secondary" (click)="next()" />
      </div>
    </div>
  </div>
  <div class="flex-1" [class]="contentStyleClass()">
    <full-calendar #fullCalendar [options]="calendarOptions" [events]="events()" />
  </div>
</div>
